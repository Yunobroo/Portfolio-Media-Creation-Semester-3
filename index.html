<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Switch Portfolio</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="app">
    <div class="top-bar">
      <div id="time"></div>
    </div>

    <div class="carousel-wrapper">
      <div class="carousel" id="carousel">
        <div class="item">Media Creation Projects</div>
        <div class="item">School Projects</div>
        <div class="item">Personal Projects</div>
        <div class="item">About Me</div>
      </div>
    </div>

    <div class="achievements-panel" id="achievementsPanel">
      <h2 id="achievementTitle">Achievements</h2>
      <ul id="achievementList"></ul>
    </div>

    <div class="hint">← → move &nbsp;&nbsp; ↑ show achievements &nbsp;&nbsp; ↓ hide achievements</div>
  </div>

  <script src="js/main.js"></script>
</body>
</html>
